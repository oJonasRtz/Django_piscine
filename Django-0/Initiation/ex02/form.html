<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta
			name="viewport"
			content="
				width=device-width,
				initial-scale=1.0
			"
		>
		<meta
			name="description"
			content="Resume"
		>

		<title>My Awesome Form</title>

		<style>
			body {
				margin: 0;
				min-height: 100vh;
				display: grid;
				place-items: center;
				font-family: Arial, sans-serif;
				color: white;
				background-color: rebeccapurple;
				padding: 40px 0;
				box-sizing: border-box;
			}
			.field {
				position: relative;
				margin-bottom: 20px;
				display: flex;
			}

			.field input[type="number"],
			.field input[type="tel"],
			.field input[type="email"],
			.field input[type="text"] {
				flex: 1;
				padding: 14px 10px;
				border: 1px solid white;
				border-radius: 6px;
				background-color: rgba(255, 255, 255, .8);
				font-size: 1em;
				outline: none;
			}

			.field label {
				position: absolute;
				left: 10px;
				top: 14px;
				color: gray;
				font-size: 1em;
				pointer-events: none;
				transition: 0.2s ease all;
			}

			/* focus or value */
			.field input:focus + label,
			.field input:not(:placeholder-shown) + label {
				top: -8px;
				left: 8px;
				font-size: 0.75em;
				color: white;
				background: rebeccapurple;
				padding: 0 4px;
			}

			.card {
				margin: 10px;
				border: solid 2px white;
				border-collapse: collapse;
				background-color: rgba(0, 0, 0, .5);
				border-radius: 12px;
				padding: 15px;
				width: 100%;
				max-width: 500px;
				box-shadow: 0 4px 8px rgba(0, 0, 0, .2);
				text-align: center;
			}
			.card button {
				width: 100%;
				padding: 14px;
				border: none;
				border-radius: 6px;
				background: linear-gradient(135deg, #3b82f6, #2563eb);
				color: white;
				font-size: 1em;
				cursor: pointer;
				transition: all 0.2s ease;
				font-weight: bold;
				box-shadow: 0 4px 10px rgba(0, 0, 0, .2);
			}
			.card button:hover {
				transform: translateY(-2px);
				box-shadow: 0 6px 12px rgba(0, 0, 0, .3);
			}
			.card button:active {
				transform: translateY(0);
				box-shadow: 0 3px 8px rgba(0, 0, 0, .2);
			}
			.card button:focus {
				outline: 2px solid white;
				outline-offset: 2px;
			}
			.card button:disabled {
				background: gray;
				cursor: not-allowed;
				box-shadow: none;
				opacity: .7;
			}

			.radio-option {
				display: flex;
				align-items: center;
				gap: 8px;
				margin-bottom: 6px;
				cursor: pointer;
			}
			.gender-field {
				display: flex;
				margin-bottom: 20px;
				text-align: left;
				gap: 20px;
				align-items: center;
			}
			.gender-field input[type="radio"] {
				transition: transform 0.15s ease;
			}
			.gender-field input[type="radio"]:hover {
				transform: scale(1.2);
			}
			.gender-field input[type="radio"]:active {
				transform: scale(0.9);
			}
			.radio-group {
				display: flex;
				gap: 20px;
				margin-top: 8px;
			}
			.check-group {
				margin-bottom: 20px;
				text-align: left;
			}
			.check-group input[type="checkbox"] {
				transition: transform 0.15s ease;
			}
			.check-group input[type="checkbox"]:active {
				transform: scale(0.9);
			}
			.check-group input[type="checkbox"]:hover {
				transform: scale(1.1);
			}
			.check-group input[type="checkbox"]:checked {
				animation: bounce 0.3s ease;
			}

			@keyframes bounce {
				0% { transform: scale(1);}
				30% { transform: scale(1.3);}
				60% { transform: scale(.9);}
				100% { transform: scale(1);}
			}
		</style>

		<script></script>
	</head>
	<body>

		<form class="card" id="contact-form">
			<h1>Contact</h1>

			<div class="field">
				<input type="text" name="first_name" placeholder=" " required>
				<label>Firstname</label>
			</div>
			
			<div class="field">
				<input type="text" name="name" placeholder=" " required>
				<label>Name</label>
			</div>
			
			<div class="field">
				<input type="number" name="age" placeholder=" " required>
				<label>Age</label>
			</div>
			
			<div class="field">
				<input type="tel" name="phone" placeholder=" " required>
				<label>Phone</label>
			</div>

			<div class="field">
				<input type="email" name="email" placeholder=" " required>
				<label>Email</label>
			</div>
			
			<!-- checkboxes -->

			<div class="gender-field">
				<label>Gender: </label>

				<div class="radio-group">
					<label class="radio-option">
						<input type="radio" name="gender" value="male" required>
						Male
					</label>
					<label class="radio-option">
						<input type="radio" name="gender" value="female">
						Female
					</label>
					<label class="radio-option">
						<input type="radio" name="gender" value="other">
						Other
					</label>
				</div>
			</div>

			<div class="check-group">
				<label>
					<input type="checkbox" name="is_student" value="yes">
					Student at 42?
				</label>
			</div>

			<button type="submit">Submit</button>
		</form>

	</body>
</html>
